# benchmark_config.yaml
# Central config for the VLM benchmark.
# All model paths, judge settings, and run options live here.

# ── Output ────────────────────────────────────────────────────────────────────
output_dir: results

# ── Judge (Claude-as-judge) ───────────────────────────────────────────────────
judge:
  model: gpt-5.4-mini 
  max_tokens: 256
  timeout_seconds: 30

# ── Generation defaults (can be overridden per model below) ───────────────────
generation_defaults:
  max_new_tokens: 256
  do_sample: false

# ── Models ────────────────────────────────────────────────────────────────────
# enabled: false to skip a model without deleting its config
# model_path: HuggingFace repo ID or local path
# generation: optional overrides on top of generation_defaults above

models:
  smolvlm:
    enabled: true
    class: SmolVLMModel
    model_path: /mnt/shared/dils/models/SmolVLM2-2.2B-Instruct
    dtype: bfloat16
    generation:
      max_new_tokens: 256

  internvl:
    enabled: true
    class: InternVLModel
    model_path: OpenGVLab/InternVL3_5-4B-HF
    # swap to local path once downloaded to avoid cache issues:
    # model_path: /mnt/shared/dils/models/InternVL3_5-4B-HF
    dtype: bfloat16
    generation:
      max_new_tokens: 256

  qwen3vl_4b:
    enabled: true
    class: Qwen3VLModel
    model_path: /mnt/shared/dils/models/Qwen3-VL-4B-Instruct
    dtype: bfloat16
    generation:
      max_new_tokens: 256

  qwen3vl_8b:
    enabled: true
    class: Qwen3VLModel
    model_path: /mnt/shared/dils/models/Qwen3-VL-8B-Instruct
    dtype: bfloat16
    generation:
      max_new_tokens: 256

  # ── Template for adding a new model ─────────────────────────────────────────
  # yourmodel:
  #   enabled: false
  #   class: YourModelClass          # must match class name in models/yourmodel.py
  #   model_path: /mnt/shared/dils/models/your-model
  #   dtype: bfloat16                # float32 | float16 | bfloat16
  #   generation:
  #     max_new_tokens: 256
