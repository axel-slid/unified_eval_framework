events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ── Model worker upstreams ─────────────────────────────────────────────────
    upstream smolvlm_upstream {
        server smolvlm:8080;
    }
    upstream qwen3vl_upstream {
        server qwen3vl_4b:8080;
    }
    upstream internvl_upstream {
        server internvl_4b:8080;
    }
    upstream frontend_upstream {
        server frontend:8090;
    }

    server {
        listen 80;
        server_name _;

        # ── Model API routes — each model gets its own path prefix ──────────────
        # /api/smolvlm/*     → smolvlm container
        # /api/qwen3vl_4b/*  → qwen3vl_4b container
        # /api/internvl_4b/* → internvl_4b container

        location /api/smolvlm/ {
            rewrite ^/api/smolvlm/(.*) /api/$1 break;
            proxy_pass         http://smolvlm_upstream;
            proxy_set_header   Host $host;
            proxy_read_timeout 300s;
        }

        location /api/qwen3vl_4b/ {
            rewrite ^/api/qwen3vl_4b/(.*) /api/$1 break;
            proxy_pass         http://qwen3vl_upstream;
            proxy_set_header   Host $host;
            proxy_read_timeout 300s;
        }

        location /api/internvl_4b/ {
            rewrite ^/api/internvl_4b/(.*) /api/$1 break;
            proxy_pass         http://internvl_upstream;
            proxy_set_header   Host $host;
            proxy_read_timeout 300s;
        }

        # ── Frontend static files ───────────────────────────────────────────────
        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
        }
    }
}
